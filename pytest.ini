[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Don't collect the pre-existing standalone integration scripts —
# they use the test_ prefix but are designed to be run as
# `python tests/test_chromedriver.py`, not via pytest. Their function
# args (host, port, proxy_url) collide with pytest's fixture lookup.
# Run them explicitly when you want to exercise live infra:
#   python tests/test_chromedriver.py
#   python tests/test_proxy_live.py
#   python tests/test_proxy_rotation.py
# collect_ignore_glob removed in pytest 9 — replaced with collect_ignore in tests/conftest.py
norecursedirs = .venv .git profiles _legacy chrome_win64 dist

addopts =
    --strict-markers
    --tb=short
    -ra

markers =
    integration: requires a live Chromium binary or external service (skip by default)
    slow:        > 2s — fine for CI, skip during tight TDD loops

filterwarnings =
    ignore::DeprecationWarning:selenium.*
    ignore::DeprecationWarning:urllib3.*
    ignore::pytest.PytestReturnNotNoneWarning
