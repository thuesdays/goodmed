<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Shell Dashboard</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">G</div>
      <div>
        <div class="sidebar-brand-name">Ghost Shell</div>
        <div class="sidebar-brand-sub">Control center</div>
      </div>
    </div>

    <nav class="sidebar-menu" id="sidebar-menu">
      <div class="sidebar-item" data-page="overview">
        <span class="sidebar-item-icon">📊</span> Overview
      </div>
      <div class="sidebar-item" data-page="profiles">
        <span class="sidebar-item-icon">👤</span> Profiles
      </div>
      <div class="sidebar-item" data-page="search">
        <span class="sidebar-item-icon">🔍</span> Search
      </div>
      <div class="sidebar-item" data-page="proxy">
        <span class="sidebar-item-icon">🌐</span> Proxy
      </div>
      <div class="sidebar-item" data-page="competitors">
        <span class="sidebar-item-icon">🏢</span> Competitors
        <span class="sidebar-badge" id="badge-competitors">0</span>
      </div>
      <div class="sidebar-item" data-page="behavior">
        <span class="sidebar-item-icon">⚙️</span> Behavior
      </div>
      <div class="sidebar-item" data-page="actions">
        <span class="sidebar-item-icon">🎯</span> Actions
      </div>
      <div class="sidebar-item" data-page="runs">
        <span class="sidebar-item-icon">🕐</span> Runs
      </div>
      <div class="sidebar-item" data-page="scheduler">
        <span class="sidebar-item-icon">🕰</span> Scheduler
      </div>
      <div class="sidebar-item" data-page="logs">
        <span class="sidebar-item-icon">📜</span> Logs
      </div>
    </nav>

    <div class="sidebar-footer">
      <button id="run-btn" class="run-btn">
        <span id="run-btn-icon">▶</span>
        <span id="run-btn-text">Start</span>
      </button>
      <button id="stop-btn" class="run-btn stop-btn" style="display:none">
        <span>■</span> <span>Stop</span>
      </button>
      <div class="run-status" id="run-status">Ready</div>
    </div>
  </aside>

  <main id="content" class="content">
    <div class="loading-shell">Loading...</div>
  </main>

</div>

<div class="toast" id="toast"></div>

<!-- Core shared modules -->
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/config-form.js"></script>
<script src="/js/runner.js"></script>

<!-- Page modules -->
<script src="/js/pages/overview.js"></script>
<script src="/js/pages/profiles.js"></script>
<script src="/js/pages/search.js"></script>
<script src="/js/pages/proxy.js"></script>
<script src="/js/pages/profile-detail.js"></script>
<script src="/js/pages/competitors.js"></script>
<script src="/js/pages/behavior.js"></script>
<script src="/js/pages/actions.js"></script>
<script src="/js/pages/runs.js"></script>
<script src="/js/pages/scheduler.js"></script>
<script src="/js/pages/logs.js"></script>

<!-- Router (must be last) -->
<script src="/js/app.js"></script>

</body>
</html>
