<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Shell Dashboard</title>

<!-- Favicon: modern browsers pick the SVG (scales crisp at any DPR),
     Safari/older fall back to the PNG, legacy IE/Edge reads the .ico. -->
<link rel="icon"                 type="image/svg+xml" href="/favicon.svg">
<link rel="icon"                 type="image/png"     href="/favicon-32.png"  sizes="32x32">
<link rel="icon"                 type="image/png"     href="/favicon-16.png"  sizes="16x16">
<link rel="apple-touch-icon"                          href="/apple-touch-icon.png">
<link rel="shortcut icon"                             href="/favicon.ico">
<meta name="theme-color" content="#6366f1">

<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-brand" data-page="overview"
         title="Go to Overview" role="button" tabindex="0">
      <div class="sidebar-brand-icon">G</div>
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-build" id="sidebar-build-badge"
             title="Chromium source version this binary was built from"
             style="display: none;">
          <span class="build-dot"></span>
          <span id="sidebar-build-text">…</span>
        </div>
        <div class="sidebar-brand-name">Ghost Shell</div>
        <div class="sidebar-brand-sub">Control center</div>
      </div>
    </div>

    <nav class="sidebar-menu" id="sidebar-menu">
      <!-- WORKSPACE: dashboards + profile management -->
      <div class="sidebar-section-label">Workspace</div>
      <div class="sidebar-item" data-page="overview">
        <span class="sidebar-item-icon">📊</span><span>Overview</span>
      </div>
      <div class="sidebar-item" data-page="profiles">
        <span class="sidebar-item-icon">👤</span><span>Profiles</span>
      </div>
      <div class="sidebar-item" data-page="groups">
        <span class="sidebar-item-icon">📁</span><span>Groups</span>
      </div>

      <!-- IDENTITY: things that shape what the browser looks like -->
      <div class="sidebar-section-label">Identity</div>
      <div class="sidebar-item" data-page="proxy">
        <span class="sidebar-item-icon">🌐</span><span>Proxy</span>
      </div>
      <div class="sidebar-item" data-page="session">
        <span class="sidebar-item-icon">🍪</span><span>Session/Cookies</span>
      </div>
      <div class="sidebar-item" data-page="behavior">
        <span class="sidebar-item-icon">⚙️</span><span>Behavior</span>
      </div>
      <div class="sidebar-item" data-page="scripts">
        <span class="sidebar-item-icon">🎬</span><span>Scripts</span>
      </div>
      <div class="sidebar-item" data-page="accounts">
        <span class="sidebar-item-icon">🔐</span><span>Accounts & Vault</span>
      </div>

      <!-- TARGETS: what we're looking at out there -->
      <div class="sidebar-section-label">Targets</div>
      <div class="sidebar-item" data-page="domains">
        <span class="sidebar-item-icon">🌍</span><span>Domains</span>
      </div>
      <div class="sidebar-item" data-page="competitors">
        <span class="sidebar-item-icon">🏢</span><span>Competitors</span>
        <span class="sidebar-badge" id="badge-competitors">0</span>
      </div>

      <!-- MONITORING: operational signals -->
      <div class="sidebar-section-label">Monitoring</div>
      <div class="sidebar-item" data-page="runs">
        <span class="sidebar-item-icon">🕐</span><span>Runs</span>
      </div>
      <div class="sidebar-item" data-page="traffic">
        <span class="sidebar-item-icon">📈</span><span>Traffic</span>
      </div>
      <div class="sidebar-item" data-page="scheduler">
        <span class="sidebar-item-icon">🕰</span><span>Scheduler</span>
      </div>
      <div class="sidebar-item" data-page="logs">
        <span class="sidebar-item-icon">📜</span><span>Logs</span>
      </div>

      <!-- Separator before Settings — system-level, not a nav target -->
      <div class="sidebar-section-gap"></div>
      <div class="sidebar-item" data-page="settings">
        <span class="sidebar-item-icon">💾</span><span>Settings</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <!-- "N running" counter appears when ≥1 slot is active. Clicking
           it expands a small panel showing each active run with its own
           stop button. -->
      <div class="active-runs-panel" id="active-runs-panel" style="display:none">
        <div class="active-runs-header">
          <span class="active-runs-count">
            <span class="active-runs-dot"></span>
            <span id="active-runs-count-text">0 running</span>
          </span>
          <button id="btn-stop-all" class="btn-stop-all"
                  title="Terminate every active run and their Chrome processes">
            ■ Stop all
          </button>
        </div>
        <div class="active-runs-list" id="active-runs-list">
          <!-- populated by runner.js -->
        </div>
      </div>

      <!-- "Run default profile" sidebar button removed 2026-04. All
           profile launches now happen from the Profiles page (per-row
           Start button + bulk-start). The active-runs panel above is
           kept since it's a global indicator and lets users stop runs
           without navigating. -->
    </div>
  </aside>

  <main id="content" class="content">
    <div class="loading-shell">Loading...</div>
  </main>

</div>

<div class="toast" id="toast"></div>

<!-- Core shared modules -->
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/config-form.js"></script>
<script src="/js/runner.js"></script>

<!-- Page modules -->
<script src="/js/pages/overview.js"></script>
<script src="/js/pages/profiles.js"></script>
<script src="/js/pages/groups.js"></script>
<script src="/js/pages/proxy.js"></script>
<script src="/js/pages/profile-detail.js"></script>
<script src="/js/pages/fingerprint.js"></script>
<script src="/js/pages/session.js"></script>
<script src="/js/pages/accounts.js"></script>
<script src="/js/pages/competitors.js"></script>
<script src="/js/pages/behavior.js"></script>
<script src="/js/pages/scripts.js"></script>
<script src="/js/pages/domains.js"></script>
<script src="/js/pages/runs.js"></script>
<script src="/js/pages/traffic.js"></script>
<script src="/js/pages/scheduler.js"></script>
<script src="/js/pages/logs.js"></script>
<script src="/js/pages/settings.js"></script>

<!-- Router (must be last) -->
<script src="/js/app.js"></script>

</body>
</html>
