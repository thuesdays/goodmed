<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ghost Shell favicon.
  Matches the sidebar-brand-icon: 36×36 rounded gradient G (indigo → violet).
  Simplified for small sizes (16×16, 32×32 in the browser tab).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gs-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Subtle inner glow so the letter doesn't look flat at 32×32 -->
    <filter id="gs-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded tile background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#gs-grad)"/>

  <!-- Letter G — thick stroke so it survives at 16×16.
       Drawn as a single path rather than a <text> element because
       rendering Poppins/Inter in a tiny favicon is inconsistent
       across platforms. -->
  <g filter="url(#gs-glow)">
    <path d="
      M 42 22
      A 14 14 0 1 0 42 46
      L 42 35
      L 32 35
    "
      fill="none"
      stroke="white"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>
</svg>
